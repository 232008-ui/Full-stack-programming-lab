<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Dynamic Quiz</h2>

        <div class="question">
            <p id="q1"></p>
            <input type="text" id="a1">
        </div>

        <div class="question">
            <p id="q2"></p>
            <input type="text" id="a2">
        </div>

        <div class="question">
            <p id="q3"></p>
            <input type="text" id="a3">
        </div>

        <div class="question">
            <p id="q4"></p>
            <input type="text" id="a4">
        </div>

        <div class="question">
            <p id="q5"></p>
            <input type="text" id="a5">
        </div>

        <button onclick="checkQuiz()">Submit</button>
        <button onclick="resetQuiz()">Reset Quiz</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
